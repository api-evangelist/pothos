"""
Pothos GraphQL Schema Builder - SDL Vocabulary Reference

Pothos (https://pothos-graphql.dev) is a TypeScript-first, code-first GraphQL schema builder
library. This SDL documents the complete vocabulary of GraphQL types, interfaces, directives,
and patterns that Pothos generates and manages. Pothos itself has no network endpoint — it is
an npm package (@pothos/core) that produces graphql-js Schema objects.

Schema source: https://github.com/hayes/pothos (packages/core and plugin packages)
Documentation: https://pothos-graphql.dev/docs
"""

# ---------------------------------------------------------------------------
# BUILT-IN SCALARS
# Pothos supports all five standard GraphQL scalars natively. Custom scalars
# can be registered via builder.addScalarType() or builder.scalarType().
# ---------------------------------------------------------------------------

"""The `String` scalar type represents UTF-8 character sequences."""
scalar String

"""The `Int` scalar type represents non-fractional signed whole numeric values."""
scalar Int

"""The `Float` scalar type represents signed double-precision fractional values."""
scalar Float

"""The `Boolean` scalar type represents `true` or `false`."""
scalar Boolean

"""
The `ID` scalar type represents a unique identifier, serialized as a String.
Pothos v3 defaults: Input = String | number, Output = String | number.
"""
scalar ID

# ---------------------------------------------------------------------------
# EXAMPLE CUSTOM SCALARS
# Registered via: builder.addScalarType('Date', GraphQLDateScalar)
# or: builder.scalarType('PositiveInt', { serialize, parseValue })
# Common additions from the graphql-scalars package.
# ---------------------------------------------------------------------------

"""ISO-8601 date scalar (example custom scalar via graphql-scalars or builder.scalarType)."""
scalar Date

"""Arbitrary JSON value (recommended to type as unknown in TypeScript)."""
scalar JSON

# ---------------------------------------------------------------------------
# ROOT OPERATION TYPES
# Defined by adding fields with builder.queryType(), builder.mutationType(),
# builder.subscriptionType(), or by using builder.queryField() / mutationField()
# / subscriptionField() for individual root fields.
# ---------------------------------------------------------------------------

"""
Root query type. Fields are added with:
  builder.queryType({ fields: (t) => ({ ... }) })
  builder.queryField('fieldName', (t) => t.field({ ... }))
"""
type Query {
  """
  Example: fetch a single node by global Relay ID.
  Added automatically by the Relay plugin when nodeQueryOptions is not false.
  """
  node(id: ID!): Node

  """
  Example: fetch multiple nodes by global Relay IDs.
  Added automatically by the Relay plugin when nodesQueryOptions is not false.
  """
  nodes(ids: [ID!]!): [Node]!
}

"""
Root mutation type. Fields are added with:
  builder.mutationType({ fields: (t) => ({ ... }) })
  builder.mutationField('fieldName', (t) => t.field({ ... }))
"""
type Mutation {
  """
  Relay mutation pattern: input/payload with clientMutationId.
  Generated by builder.relayMutationField() from the Relay plugin.
  """
  exampleRelayMutation(input: ExampleRelayMutationInput!): ExampleRelayMutationPayload
}

"""
Root subscription type. Fields are added with:
  builder.subscriptionType({ fields: (t) => ({ ... }) })
  builder.subscriptionField('fieldName', (t) => t.field({ ... }))
"""
type Subscription {
  """Example subscription field. Resolvers return AsyncIterables."""
  exampleEvent: String
}

# ---------------------------------------------------------------------------
# OBJECT TYPES
# Defined with builder.objectType(ClassName | 'Name', { fields: (t) => ({}) })
# Fields use t.string(), t.int(), t.float(), t.boolean(), t.id(), t.field(),
# t.expose*(), etc.
# ---------------------------------------------------------------------------

"""
Example object type demonstrating core field builder methods.
Pothos decouples the internal backing model from the GraphQL shape.
"""
type ExampleObject {
  """Exposed via t.exposeString() or t.string({ resolve })"""
  name: String!

  """Exposed via t.exposeInt() or t.int({ resolve })"""
  count: Int!

  """Exposed via t.exposeFloat() or t.float({ resolve })"""
  rating: Float

  """Exposed via t.exposeBoolean() or t.boolean({ resolve })"""
  active: Boolean!

  """Exposed via t.exposeID() or t.id({ resolve })"""
  id: ID!

  """Nested object relationship via t.field({ type: OtherType })"""
  related: ExampleRelatedObject

  """List field via t.field({ type: [OtherType] })"""
  items: [ExampleRelatedObject!]!
}

"""Related object type illustrating nested object references."""
type ExampleRelatedObject {
  id: ID!
  label: String!
}

# ---------------------------------------------------------------------------
# INTERFACE TYPES
# Defined with builder.interfaceType('Name', { fields: (t) => ({}) })
# Objects implement interfaces via: builder.objectType(Class, { interfaces: [IFace] })
# ---------------------------------------------------------------------------

"""
Example interface type.
builder.interfaceType('Animal', { fields: (t) => ({ diet: t.expose('diet', { type: Diet }) }) })
"""
interface Animal {
  """Field exposed on the interface, shared by all implementing types."""
  diet: Diet!
}

"""
Object implementing the Animal interface.
builder.objectType(Giraffe, { interfaces: [Animal], isTypeOf: (v) => v instanceof Giraffe })
"""
type Giraffe implements Animal {
  diet: Diet!
  neckLength: Float!
  species: GiraffeSpecies!
}

# ---------------------------------------------------------------------------
# UNION TYPES
# Defined with builder.unionType('Name', { types: [...], resolveType: (v) => ... })
# ---------------------------------------------------------------------------

"""
Example union type combining two object types.
builder.unionType('SearchResult', { types: [Giraffe, ExampleObject], resolveType })
"""
union SearchResult = Giraffe | ExampleObject

# ---------------------------------------------------------------------------
# ENUM TYPES
# Defined with builder.enumType(TSEnum | 'Name', { values: [...] | { ... } })
# ---------------------------------------------------------------------------

"""
Enum defined from a TypeScript enum or array of string values.
builder.enumType('Diet', { values: ['HERBIVOROUS', 'CARNIVOROUS', 'OMNIVOROUS'] as const })
"""
enum Diet {
  HERBIVOROUS
  CARNIVOROUS
  OMNIVOROUS
}

"""
Enum with value descriptions.
builder.enumType('GiraffeSpecies', { values: { Southern: { description: '...', value: 'giraffa' } } })
"""
enum GiraffeSpecies {
  """Also known as two-horned giraffe"""
  Southern
  Masai
  Reticulated
  Northern
}

"""
Length unit enum illustrating string-backed enum pattern.
"""
enum LengthUnit {
  Feet
  Meters
}

# ---------------------------------------------------------------------------
# INPUT TYPES
# Defined with builder.inputType('Name', { fields: (t) => ({}) })
# Fields use t.string(), t.int(), t.float(), t.boolean(), t.id(), t.field()
# with required: true/false.
# ---------------------------------------------------------------------------

"""
Example input type.
builder.inputType('GiraffeInput', { fields: (t) => ({ name: t.string({ required: true }), ... }) })
"""
input GiraffeInput {
  name: String!
  birthdate: String!
  height: Float!
  species: GiraffeSpecies
}

"""
Recursive input type using builder.inputRef<Shape>('Name').implement({ fields }).
"""
input RecursiveGiraffeInput {
  name: String!
  parent: RecursiveGiraffeInput
}

# ---------------------------------------------------------------------------
# RELAY PLUGIN TYPES
# Package: @pothos/plugin-relay
# The Relay plugin adds Node, PageInfo, Connection, and Edge patterns.
# Configured via: builder = new SchemaBuilder({ plugins: [RelayPlugin], relay: { ... } })
# ---------------------------------------------------------------------------

"""
The global Node interface from the Relay specification.
All relay-compatible object types implement this interface.
Created automatically on first use of builder.node() or builder.prismaNode().
Name is configurable via relay.nodeTypeOptions.name.
"""
interface Node {
  """
  Global ID encoding typename + internal ID.
  Cursor type is configurable (String or ID) via relay.cursorType.
  """
  id: ID!
}

"""
Pagination metadata object included in every Connection type.
Created automatically by the Relay plugin.
Name is configurable via relay.pageInfoTypeOptions.name.
"""
type PageInfo {
  """Whether there are more items after the current page."""
  hasNextPage: Boolean!

  """Whether there are more items before the current page."""
  hasPreviousPage: Boolean!

  """Cursor of the first item in the current page."""
  startCursor: String

  """Cursor of the last item in the current page."""
  endCursor: String
}

"""
Example Relay Node type created with builder.node('ExampleNode', { ... }).
Implements the Node interface and provides a load function for node(id:) queries.
"""
type ExampleNode implements Node {
  id: ID!
  name: String!
  description: String
}

"""
Example Relay Connection type wrapping ExampleNode.
Generated by builder.node() or t.connection() field builder.
Name pattern: {TypeName}Connection
"""
type ExampleNodeConnection {
  """List of edges in this connection."""
  edges: [ExampleNodeEdge]!

  """Pagination metadata for this connection."""
  pageInfo: PageInfo!

  """Optional: total count (added via t.totalCount or manual field)."""
  totalCount: Int
}

"""
Example Relay Edge type.
Name pattern: {TypeName}Edge
Contains a node reference and cursor for pagination.
"""
type ExampleNodeEdge {
  """The actual data node."""
  node: ExampleNode

  """Pagination cursor for this edge position."""
  cursor: String!
}

"""
Standard Relay connection arguments available via t.arg.connectionArgs().
Used on fields that return Connection types.
"""
input ConnectionArguments {
  """Return the first N items."""
  first: Int

  """Return items after this cursor (forward pagination)."""
  after: String

  """Return the last N items."""
  last: Int

  """Return items before this cursor (backward pagination)."""
  before: String
}

"""
Relay mutation input type pattern.
Generated by builder.relayMutationField() from the Relay plugin.
clientMutationId is configurable: 'required' | 'optional' | 'omit'
"""
input ExampleRelayMutationInput {
  clientMutationId: String
  name: String!
}

"""
Relay mutation payload type.
Generated by builder.relayMutationField() from the Relay plugin.
"""
type ExampleRelayMutationPayload {
  clientMutationId: String
  node: ExampleNode
}

# ---------------------------------------------------------------------------
# PRISMA PLUGIN TYPES
# Package: @pothos/plugin-prisma
# Generates GraphQL types from Prisma models.
# builder.prismaObject('ModelName', { fields: (t) => ({ ... }) })
# builder.prismaNode('ModelName', { id: { field: 'id' }, fields: ... })
# ---------------------------------------------------------------------------

"""
Example Prisma-generated object type.
builder.prismaObject('User', { fields: (t) => ({ id: t.exposeID('id'), ... }) })
"""
type User {
  """Exposed directly from Prisma model via t.exposeID('id')"""
  id: ID!

  """Exposed directly from Prisma model via t.exposeString('name')"""
  name: String!

  """Exposed directly from Prisma model via t.exposeString('email')"""
  email: String!

  """Relation field via t.relation('posts') - triggers Prisma include"""
  posts: [Post!]!

  """Relay connection for a relation via t.relatedConnection('posts', { cursor: 'id' })"""
  postsConnection(first: Int, after: String, last: Int, before: String): PostConnection!

  """Computed field via t.string({ resolve: (user) => ... })"""
  displayName: String!
}

"""
Example Prisma Relay Node type.
builder.prismaNode('Post', { id: { field: 'id' }, fields: (t) => ({ ... }) })
"""
type Post implements Node {
  id: ID!
  title: String!
  content: String
  published: Boolean!
  author: User!

  """Count field added via t.relationCount('comments')"""
  commentCount: Int!
}

"""Relay Connection for Post type generated by t.relatedConnection()."""
type PostConnection {
  edges: [PostEdge]!
  pageInfo: PageInfo!
  totalCount: Int
}

"""Relay Edge for Post type."""
type PostEdge {
  node: Post
  cursor: String!
}

"""
Root query field using t.prismaField() for optimized Prisma queries.
builder.queryField('user', (t) => t.prismaField({ type: 'User', resolve: async (query, root, args) => ... }))
"""
type PrismaQueryExample {
  """Single record lookup with automatic select/include optimization."""
  user(id: ID!): User

  """List query with Prisma filtering."""
  users: [User!]!
}

# ---------------------------------------------------------------------------
# SCOPE AUTH PLUGIN TYPES
# Package: @pothos/plugin-scope-auth
# Authorization is defined via authScopes on types and fields (not as directives).
# This section documents the conceptual vocabulary exposed at schema build time.
# ---------------------------------------------------------------------------

"""
Example type with type-level auth scope applied.
builder.objectType('ProtectedObject', { authScopes: { isAuthenticated: true }, fields: ... })
Type-level scopes apply to all fields by default. Fields can use skipTypeScopes: true to opt out.
"""
type ProtectedObject {
  id: ID!
  secretData: String!
  """Field with field-level scope override via authScopes in field options."""
  adminOnlyField: String
}

"""
Example type granting child field scopes.
builder.objectType('Post', { grantScopes: (post, ctx) => post.authorId === ctx.userId ? ['isAuthor'] : [] })
"""
type PostWithGrantedScopes {
  id: ID!
  title: String!
  """Field accessible only to the post author via granted 'isAuthor' scope."""
  draftContent: String
}

# ---------------------------------------------------------------------------
# COMPLEXITY PLUGIN TYPES
# Package: @pothos/plugin-complexity
# Adds complexity tracking to field definitions (configured on fields, not directives).
# ---------------------------------------------------------------------------

"""
Complexity configuration is applied per-field in the builder, not as SDL directives.
Example: t.field({ type: [Post], complexity: { field: 1, multiplier: 10 }, resolve: ... })
The plugin enforces limits before execution:
  - complexity: maximum total complexity score
  - depth: maximum query nesting level
  - breadth: maximum selections per level
List fields default to a 10x multiplier to model N+1 potential.
"""
type ComplexityExample {
  """Simple field: complexity: 1 (default)"""
  name: String!

  """List field: complexity 1, multiplier 10 (default) = effectively 10 per item"""
  items: [String!]!

  """Custom complexity: t.field({ complexity: (args, ctx) => args.limit * 2 })"""
  pagedItems(limit: Int!): [String!]!
}

# ---------------------------------------------------------------------------
# DATALOADER PLUGIN TYPES
# Package: @pothos/plugin-dataloader
# Batch-loads objects to prevent N+1 queries.
# ---------------------------------------------------------------------------

"""
Object type created with builder.loadableObject('Name', { load: async (ids, ctx) => ... }).
The load function receives an array of IDs and must return results in matching order.
"""
type LoadableUser {
  id: ID!
  name: String!
  email: String!
}

"""
Relay-compatible loadable node created with builder.loadableNode().
Automatically integrates with the Relay node(id:) query.
"""
type LoadablePost implements Node {
  id: ID!
  title: String!

  """
  Field using t.loadable({ load: async (ids, ctx) => ..., type: LoadableUser }).
  Batches author lookups across multiple post resolutions.
  """
  author: LoadableUser!

  """
  List field using t.loadableList() for one-to-many batching.
  """
  tags: [String!]!
}

# ---------------------------------------------------------------------------
# ERRORS PLUGIN TYPES
# Package: @pothos/plugin-errors
# Generates union types for structured error handling on fields.
# ---------------------------------------------------------------------------

"""
Base error interface that all error types implement.
Defined via builder.objectType(Error, { name: 'Error', fields: (t) => ({ message: t.exposeString('message') }) })
"""
interface ErrorInterface {
  message: String!
}

"""
Standard Error object type wrapping JavaScript Error instances.
builder.objectType(Error, { name: 'Error', interfaces: [ErrorInterface] })
"""
type Error {
  message: String!
}

"""
Example validation error type.
builder.objectType(ValidationError, { name: 'ValidationError', interfaces: [ErrorInterface] })
"""
type ValidationError {
  message: String!
  fieldErrors: [FieldError!]!
}

"""Individual field validation error."""
type FieldError {
  field: String!
  message: String!
}

"""
Success wrapper generated by the errors plugin for non-direct-result fields.
Pattern: {Query}{Field}Success with a `data` field containing the actual value.
Example: field 'hello' on Query becomes QueryHelloSuccess { data: String! }
"""
type QueryHelloSuccess {
  data: String!
}

"""
Union type generated by the errors plugin for a field with error types.
Pattern: union {Query}{Field}Result = ErrorType | ... | {Query}{Field}Success
Example: t.string({ errors: { types: [Error] } }) produces this union.
"""
union QueryHelloResult = Error | QueryHelloSuccess

"""
Example list field with item-level errors.
t.field({ type: [Post], itemErrors: { types: [Error] } })
Each list item wrapped in: union QueryListItemResult = Error | QueryListItemSuccess
"""
type QueryListItemSuccess {
  data: Post
}

union QueryListItemResult = Error | QueryListItemSuccess

# ---------------------------------------------------------------------------
# VALIDATION PLUGIN TYPES
# Package: @pothos/plugin-validation
# Adds StandardSchemaV1-compatible validation (Zod, Valibot, ArkType) to input fields.
# Validation is configured in field argument options, not as SDL directives.
# ---------------------------------------------------------------------------

"""
Input type with validation constraints applied via the validation plugin.
Constraints are TypeScript-only (Zod schema, Valibot, or ArkType) and enforced at runtime.
"""
input ValidatedUserInput {
  """Validated with: t.string({ validate: { minLength: 2, maxLength: 100 } })"""
  name: String!

  """Validated with Zod: t.string({ validate: { schema: z.string().email() } })"""
  email: String!

  """Validated with: t.int({ validate: { min: 0, max: 150 } })"""
  age: Int
}

# ---------------------------------------------------------------------------
# WITH-INPUT PLUGIN TYPES
# Package: @pothos/plugin-with-input
# Convenience plugin that auto-generates input types from field arguments.
# ---------------------------------------------------------------------------

"""
Input type auto-generated by the with-input plugin.
Pattern: builder.mutationField('createUser', (t) => t.fieldWithInput({ ... }))
Auto-generates: CreateUserInput type from the `input` fields definition.
"""
input CreateUserInput {
  name: String!
  email: String!
  role: String
}

"""
Result type for a mutation using the with-input plugin.
"""
type CreateUserPayload {
  user: User!
}

# ---------------------------------------------------------------------------
# DIRECTIVES PLUGIN TYPES
# Package: @pothos/plugin-directives
# Enables type-safe directive application to schema types and fields.
# Directives must be declared in SchemaBuilder generic types before use.
# ---------------------------------------------------------------------------

"""
Example directive added via the directives plugin.
Declared in builder generic: Directives: { deprecated: { locations: ['FIELD_DEFINITION'], args: { reason: 'String' } } }
Applied in field options: t.string({ directives: { deprecated: { reason: '...' } } })
"""
directive @deprecated(reason: String) on FIELD_DEFINITION | ENUM_VALUE

"""
Example cache-control directive (common in federated or Apollo schemas).
"""
directive @cacheControl(maxAge: Int, scope: CacheControlScope) on FIELD_DEFINITION | OBJECT | INTERFACE

enum CacheControlScope {
  PUBLIC
  PRIVATE
}

# ---------------------------------------------------------------------------
# FEDERATION PLUGIN TYPES
# Package: @pothos/plugin-federation
# Adds Apollo Federation v1/v2 support.
# ---------------------------------------------------------------------------

"""Federation @key directive marking entity types."""
directive @key(fields: String!, resolvable: Boolean) repeatable on OBJECT | INTERFACE

"""Federation @external directive for fields owned by other subgraphs."""
directive @external on FIELD_DEFINITION | OBJECT

"""Federation @requires directive for fields requiring external data."""
directive @requires(fields: String!) on FIELD_DEFINITION

"""Federation @provides directive for fields that provide external entity data."""
directive @provides(fields: String!) on FIELD_DEFINITION

"""Federation @extends directive for extending types from other subgraphs."""
directive @extends on OBJECT | INTERFACE

"""Federation @shareable directive (v2) allowing a type to be resolved by multiple subgraphs."""
directive @shareable on OBJECT | FIELD_DEFINITION

"""Federation @inaccessible directive (v2) hiding fields from the supergraph."""
directive @inaccessible on FIELD_DEFINITION | OBJECT | INTERFACE | UNION | ARGUMENT_DEFINITION | SCALAR | ENUM | ENUM_VALUE | INPUT_OBJECT | INPUT_FIELD_DEFINITION

"""Federation @override directive (v2) for migrating fields between subgraphs."""
directive @override(from: String!) on FIELD_DEFINITION

"""
Example federated entity type.
builder.asEntity(UserType, { key: fields('id'), resolveReference: (ref) => ... })
"""
type FederatedUser @key(fields: "id") {
  id: ID!
  name: String!
}

# ---------------------------------------------------------------------------
# SMART SUBSCRIPTIONS PLUGIN TYPES
# Package: @pothos/plugin-smart-subscriptions
# Adds event-based smart subscription support.
# ---------------------------------------------------------------------------

"""
Example subscription type using the smart-subscriptions plugin.
Fields use t.field() with subscribe and resolve functions tied to named events.
"""
type SmartSubscriptionExample {
  """
  Subscription field using builder.subscriptionField('livePost', (t) => t.field({
    type: Post,
    subscribe: (subscriptions, root, args) => subscriptions.register('post:${args.id}'),
    resolve: (event) => event.post
  }))
  """
  livePost(id: ID!): Post
}

# ---------------------------------------------------------------------------
# SIMPLE OBJECTS PLUGIN TYPES
# Package: @pothos/plugin-simple-objects
# Creates object types from plain TypeScript objects without backing classes.
# ---------------------------------------------------------------------------

"""
Object type created with builder.simpleObject('Name', { fields: (t) => ({}) }).
No backing class or resolver required — fields are read directly from the plain object.
"""
type SimpleMetrics {
  requestCount: Int!
  errorCount: Int!
  averageLatencyMs: Float!
  timestamp: String!
}

# ---------------------------------------------------------------------------
# TRACING PLUGIN TYPES
# Package: @pothos/plugin-tracing + @pothos/tracing-opentelemetry | tracing-sentry | tracing-newrelic
# Adds OpenTelemetry, Sentry, or New Relic tracing spans to field resolvers.
# No SDL changes — tracing is applied as resolver wrappers during schema build.
# ---------------------------------------------------------------------------

"""
The tracing plugin wraps field resolvers with instrumentation spans.
Supported backends: OpenTelemetry (@pothos/tracing-opentelemetry),
  Sentry (@pothos/tracing-sentry), New Relic (@pothos/tracing-newrelic),
  AWS X-Ray (@pothos/tracing-xray).
No additional SDL types are generated.
"""
type _TracingNote {
  _placeholder: String
}

# ---------------------------------------------------------------------------
# DRIZZLE PLUGIN TYPES
# Package: @pothos/plugin-drizzle
# Similar to Prisma plugin but for Drizzle ORM.
# builder.drizzleObject('tableName', { fields: (t) => ({ ... }) })
# ---------------------------------------------------------------------------

"""
Example Drizzle ORM object type.
builder.drizzleObject('users', { fields: (t) => ({ id: t.exposeInt('id'), ... }) })
"""
type DrizzleUser {
  id: Int!
  name: String!
  email: String!
}

# ---------------------------------------------------------------------------
# SUB-GRAPH PLUGIN TYPES
# Package: @pothos/plugin-sub-graph
# Allows a single codebase to emit multiple subgraph schemas.
# Fields/types are tagged with subgraph names at definition time.
# ---------------------------------------------------------------------------

"""
The sub-graph plugin tags types and fields with subgraph membership.
Example: builder.queryField('adminData', (t) => t.string({ subGraphs: ['admin'], resolve: () => '...' }))
No additional SDL types are generated — the plugin filters which types appear per schema.
"""
type _SubGraphNote {
  _placeholder: String
}
